---
- name: Ensure community.docker collection is available on the control node
  hosts: localhost
  gather_facts: false
  become: false

  tasks:
    - name: Check whether community.docker.docker_image module is available
      ansible.builtin.command:
        cmd: ansible-doc -t module community.docker.docker_image
      register: docker_image_module_check
      changed_when: false
      failed_when: false

    - name: Install community.docker collection if docker_image module is missing
      ansible.builtin.command:
        cmd: ansible-galaxy collection install community.docker
      when: docker_image_module_check.rc != 0
      changed_when: true


- name: Manage persistent UBI 9 systemd container
  hosts: all
  become: true
  gather_facts: true

  vars:
    systemd_container_name: "control.example.com"
    systemd_container_image: "ubi9:latest"

    # Use obfuscated variable for SSH username
    ansible_user: "{{ robert_of_loxley }}"
    ansible_ssh_user: "{{ robert_of_loxley }}"   # legacy alias

    # Use obfuscated variable for SSH authentication
    ansible_password: "{{ give_to_the_poor }}"
    ansible_ssh_pass: "{{ give_to_the_poor }}"   # legacy alias

  roles:
    - resolve_and_set_inventory_ip_addresses

  tasks:
    - name: Ensure required Docker Python SDK is available
      ansible.builtin.package:
        name: python3-docker
        state: present

    - name: Pull UBI 9 container image
      community.docker.docker_image:
        name: "{{ systemd_container_image }}"
        source: pull

    - name: Check whether the systemd container already exists
      community.docker.docker_container_info:
        name: "{{ systemd_container_name }}"
      register: systemd_container_info
      failed_when: false

    - name: Start existing systemd container
      community.docker.docker_container:
        name: "{{ systemd_container_name }}"
        state: started
      when:
        - systemd_container_info.exists | default(false)

    - name: Create and start systemd container if it does not exist
      community.docker.docker_container:
        name: "{{ systemd_container_name }}"
        image: "{{ systemd_container_image }}"
        state: started
        detach: true
        auto_remove: false
        privileged: true
        command: /usr/sbin/init
        restart_policy: "no"
        cgroupns_mode: host
        volumes:
          - /sys/fs/cgroup:/sys/fs/cgroup:rw
        tmpfs:
          - /run
          - /tmp
        env:
          container: docker
      when:
        - not systemd_container_info.exists | default(false)